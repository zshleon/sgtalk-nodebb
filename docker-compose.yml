services:
  nodebb:
    build:
      context: .
      dockerfile: Dockerfile.nodebb
      args:
        NODEBB_TAG: ${NODEBB_TAG:-4.7}
    image: sgtalk-nodebb:${NODEBB_TAG:-4.7}
    container_name: sgtalk-nodebb
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./secrets/sso-google.env
    environment:
      TZ: Asia/Singapore
    ports:
      - "127.0.0.1:14567:4567"
    volumes:
      - ./nodebb/build:/usr/src/app/build
      - ./nodebb/uploads:/usr/src/app/public/uploads
      - ./nodebb/config:/opt/config
      - ./nodebb/setup.json:/usr/src/app/setup.json:ro
      - ./themes/nodebb-theme-sgtalk-v2ex:/opt/sgtalk-theme:ro
      - ./themes/nodebb-theme-sgtalk-v2ex/templates/compose.tpl:/usr/src/app/node_modules/nodebb-plugin-composer-default/static/templates/compose.tpl:ro
      - ./themes/nodebb-theme-sgtalk-v2ex/templates/partials/composer-title-container.tpl:/usr/src/app/node_modules/nodebb-plugin-composer-default/static/templates/partials/composer-title-container.tpl:ro
      - ./themes/nodebb-theme-sgtalk-v2ex/templates/partials/composer-formatting.tpl:/usr/src/app/node_modules/nodebb-plugin-composer-default/static/templates/partials/composer-formatting.tpl:ro
      - ./themes/nodebb-theme-sgtalk-v2ex/templates/partials/composer-write-preview.tpl:/usr/src/app/node_modules/nodebb-plugin-composer-default/static/templates/partials/composer-write-preview.tpl:ro
      - ./themes/nodebb-theme-sgtalk-v2ex/templates/partials/composer-tags.tpl:/usr/src/app/node_modules/nodebb-plugin-composer-default/static/templates/partials/composer-tags.tpl:ro
    cpus: "2.0"
    mem_limit: 2048m
    memswap_limit: 3072m
    pids_limit: 512
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongo:
    image: mongo:7-jammy
    container_name: sgtalk-nodebb-mongo
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:?missing}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:?missing}
      MONGO_INITDB_DATABASE: nodebb
      NODEBB_MONGO_USER: ${NODEBB_MONGO_USER:?missing}
      NODEBB_MONGO_PASSWORD: ${NODEBB_MONGO_PASSWORD:?missing}
    volumes:
      - ./mongo/data:/data/db
      - ./mongo/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$$MONGO_INITDB_ROOT_USERNAME\" -p \"$$MONGO_INITDB_ROOT_PASSWORD\" --authenticationDatabase admin --eval 'db.adminCommand({ ping: 1 }).ok' | grep 1"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 30s
    cpus: "1.0"
    mem_limit: 1024m
    memswap_limit: 2048m
    pids_limit: 256
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
